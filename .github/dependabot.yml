version: 2
updates:
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      cargo-minor-patch:
        update-types:
          - minor
          - patch
    ignore:
      # starknet-crypto 0.8.x still depends on starknet-types-core 0.2.x, so bumping
      # starknet-types-core to 1.x produces two incompatible Felt types in the build.
      # Revisit once starknet-crypto publishes a release compatible with 1.x.
      - dependency-name: "starknet-types-core"
        versions: [">=1.0.0"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      actions-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: "/web/frontend"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      frontend-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: "/web/coinflip"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      coinflip-minor-patch:
        update-types:
          - minor
          - patch
